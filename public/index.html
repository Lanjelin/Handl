<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Handl — Shared Shopping List</title>
    <meta name="description" content="Phone-friendly collaborative shopping list" />
    <meta name="theme-color" content="#0f172a" id="theme-color-meta" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0"
    />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="icon" sizes="192x192" href="/icon-192.png" type="image/png" />
    <link rel="icon" sizes="512x512" href="/icon-512.png" type="image/png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
  </head>
  <body>
    <div class="app-shell">
      <section class="pane single-pane">
        <div class="pane-title mode-header">
          <div class="title-block">
          <div class="title-line">
            <h2 id="app-title">Handl</h2>
          </div>
          </div>
          <div class="title-actions">
            <span
              id="status-icon"
              class="status-indicator icon-button"
              role="img"
              aria-label="Connection status"
              aria-live="polite"
            >
              <span id="status-symbol" class="material-symbols-outlined">cloud_off</span>
            </span>
            <button id="toggle-mode" class="ghost icon-button" type="button" aria-label="Switch editing mode">
              <span id="mode-icon" class="material-symbols-outlined">edit_note</span>
            </button>
            <button id="open-settings" class="ghost icon-button" type="button" aria-label="Open settings">
              <span class="material-symbols-outlined">settings</span>
            </button>
          </div>
        </div>
        <div class="pane-divider" aria-hidden="true"></div>
        <div id="checklist" class="checklist single-view" aria-live="polite"></div>
        <textarea
          id="text-editor"
          class="single-edit hidden"
          spellcheck="false"
          placeholder="Milk\nEggs\nBread"
        ></textarea>
      </section>
    </div>

    <dialog id="settings-dialog" class="settings-dialog">
      <form method="dialog">
        <header class="settings-header">
          <h3 data-i18n="settingsTitle">Settings</h3>
          <button id="close-settings" class="icon-button ghost settings-close" type="button" aria-label="Close settings">
            <span class="material-symbols-outlined">close</span>
          </button>
        </header>
        <div class="settings-body">
          <label class="setting">
            <span data-i18n="colorScheme">Color scheme</span>
            <select id="scheme-select"></select>
          </label>
          <label class="setting">
            <span data-i18n="languageLabel">Language</span>
            <select id="language-select"></select>
          </label>
          <label class="setting keep-bottom">
            <input type="checkbox" id="sort-checked" />
            <span data-i18n="sortChecked">Keep checked items at the bottom</span>
          </label>
          <div class="settings-actions">
            <button type="button" id="remove-checked" class="danger" data-i18n="removeChecked">
              Remove checked items
            </button>
          </div>
          <div class="settings-divider" aria-hidden="true"></div>
          <label class="setting stacked">
            <span data-i18n="listIdLabel">List ID</span>
            <div class="share-actions">
              <input id="settings-share-code" class="share-code-field" readonly />
            </div>
          </label>
          <label class="setting stacked">
            <span data-i18n="joinListLabel">Join list</span>
            <div class="share-actions">
              <input id="restore-code-input" placeholder="List ID" />
              <button id="restore-code-button" class="ghost" type="button" data-i18n="joinButton">Join</button>
            </div>
          </label>
        </div>
      </form>
    </dialog>

    <template id="item-template">
      <label class="check-row">
        <input type="checkbox" />
        <span class="item-text"></span>
      </label>
    </template>

    <script type="module" src="/main.js"></script>
  </body>
</html>
