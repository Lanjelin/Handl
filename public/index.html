<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Handl — Shared Shopping List</title>
    <meta name="description" content="Phone-friendly collaborative shopping list" />
    <meta name="theme-color" content="#0f172a" id="theme-color-meta" />
    <script>
      (() => {
        const DEFAULT_THEME_META_COLOR = '#0f172a';
        const LOCAL_SETTINGS_PREFIX = 'handl-settings';
        const LOCAL_UI_PREFIX = 'handl-ui-cache';
        try {
          const activeListId = localStorage.getItem('handl-active-list-id') || '';
          const settingsRaw = localStorage.getItem(LOCAL_SETTINGS_PREFIX) || (
            activeListId ? localStorage.getItem(`${LOCAL_SETTINGS_PREFIX}:${activeListId}`) : null
          );
          const uiRaw = localStorage.getItem(LOCAL_UI_PREFIX) || (
            activeListId ? localStorage.getItem(`${LOCAL_UI_PREFIX}:${activeListId}`) : null
          );
          const settings = settingsRaw ? JSON.parse(settingsRaw) : {};
          const ui = uiRaw ? JSON.parse(uiRaw) : {};
          const theme = ui.theme || {};
          const locale = ui.locale || {};
          const language = settings.language || ui.language || 'en';
          const authLocked = Boolean(window.__handlAuthLocked);
          const storedToken = localStorage.getItem('handl-session-token') || '';
          const hasJoinOrRestore = new URL(location.href).searchParams.has('join') || new URL(location.href).searchParams.has('restore');
          const addButtonMode = ['no', 'titlebar', 'left', 'right'].includes(settings.showAddButton)
            ? settings.showAddButton
            : 'no';
          const showEditButton = settings.showEditButton !== false;
          const showDeleteButton = settings.showDeleteButton === true;
          const fontSize = ['small', 'medium', 'large'].includes(settings.fontSize)
            ? settings.fontSize
            : (['small', 'medium', 'large'].includes(ui.fontSize) ? ui.fontSize : 'small');

          const loadMainModule = () => {
            if (document.getElementById('handl-main-module')) return;
            const script = document.createElement('script');
            script.id = 'handl-main-module';
            script.type = 'module';
            script.src = '/main.js';
            document.head.appendChild(script);
          };

          document.documentElement.lang = language;
          document.documentElement.dataset.scheme = settings.colorScheme || ui.colorScheme || 'default';
          document.documentElement.dataset.uiAddButton = addButtonMode;
          document.documentElement.dataset.uiShowEditButton = showEditButton ? 'true' : 'false';
          document.documentElement.dataset.uiShowDeleteButton = showDeleteButton ? 'true' : 'false';
          document.documentElement.dataset.fontSize = fontSize;
          const fastLanding = !authLocked && !storedToken && !hasJoinOrRestore;
          if (fastLanding) {
            document.documentElement.dataset.startScreen = 'landing';
          }

          if (fastLanding) {
            document.addEventListener('DOMContentLoaded', () => {
              const landingCreateButton = document.getElementById('landing-create-button');
              const landingJoinButton = document.getElementById('landing-join-button');
              const landingJoinForm = document.getElementById('landing-join-form');
              const landingShareCodeInput = document.getElementById('landing-share-code');
              const landingJoinSubmit = document.getElementById('landing-join-submit');

              const makeToken = () => crypto.randomUUID?.() || Math.random().toString(36).slice(2);
              const persistToken = (token) => localStorage.setItem('handl-session-token', token);

              const createSession = async () => {
                const token = makeToken();
                persistToken(token);
                const res = await fetch(`/session?token=${encodeURIComponent(token)}`, { cache: 'no-store' });
                if (!res.ok) throw new Error('create failed');
                location.replace('/');
              };

              const joinSession = async () => {
                const code = (landingShareCodeInput?.value ?? '').trim().toUpperCase();
                if (!code) return;
                const token = makeToken();
                persistToken(token);
                const res = await fetch('/restore', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ code, token })
                });
                if (!res.ok) throw new Error('join failed');
                location.replace('/');
              };

              if (landingJoinSubmit) {
                landingJoinSubmit.textContent = locale.joinButton || landingJoinSubmit.textContent || 'Join';
                landingJoinSubmit.setAttribute('aria-label', locale.joinButton || 'Join');
              }

              landingCreateButton?.addEventListener('click', () => {
                createSession().catch(() => {
                  localStorage.removeItem('handl-session-token');
                });
              });
              landingJoinButton?.addEventListener('click', () => {
                if (!landingJoinForm) return;
                landingJoinForm.classList.remove('hidden');
                landingShareCodeInput?.focus();
              });
              landingJoinSubmit?.addEventListener('click', () => {
                joinSession().catch(() => {
                  localStorage.removeItem('handl-session-token');
                });
              });
              landingShareCodeInput?.addEventListener('keydown', (event) => {
                if (event.key !== 'Enter') return;
                event.preventDefault();
                joinSession().catch(() => {
                  localStorage.removeItem('handl-session-token');
                });
              });
            }, { once: true });
          } else {
            const bootMain = () => loadMainModule();
            if (document.readyState === 'loading') {
              document.addEventListener('DOMContentLoaded', bootMain, { once: true });
            } else {
              bootMain();
            }
          }

          const meta = document.getElementById('theme-color-meta');
          if (meta) {
            meta.setAttribute('content', theme.metaColor || DEFAULT_THEME_META_COLOR);
          }

          if (theme.variables) {
            for (const [key, value] of Object.entries(theme.variables)) {
              if (typeof value === 'string') {
                document.documentElement.style.setProperty(key, value);
              }
            }
          }

          if (locale && typeof locale === 'object') {
            document.addEventListener('DOMContentLoaded', () => {
              const setText = (selector, value) => {
                if (!value) return;
                const element = document.querySelector(selector);
                if (element) element.textContent = value;
              };
              setText('[data-i18n="settingsTitle"]', locale.settingsTitle);
              setText('[data-i18n="showDeleteButton"]', locale.showDeleteButton);
              setText('[data-i18n="showEditButton"]', locale.showEditButton);
              setText('[data-i18n="showAddButton"]', locale.showAddButton);
              setText('[data-i18n="addButtonNo"]', locale.addButtonNo);
              setText('[data-i18n="addButtonTitleBar"]', locale.addButtonTitleBar);
              setText('[data-i18n="addButtonLeft"]', locale.addButtonLeft);
              setText('[data-i18n="addButtonRight"]', locale.addButtonRight);
              setText('[data-i18n="sortChecked"]', locale.sortChecked);
              setText('[data-i18n="colorScheme"]', locale.colorScheme);
              setText('[data-i18n="removeChecked"]', locale.removeChecked);
              setText('[data-i18n="languageLabel"]', locale.languageLabel);
              setText('[data-i18n="fontSizeLabel"]', locale.fontSizeLabel);
              setText('[data-i18n="fontSizeSmall"]', locale.fontSizeSmall);
              setText('[data-i18n="fontSizeMedium"]', locale.fontSizeMedium);
              setText('[data-i18n="fontSizeLarge"]', locale.fontSizeLarge);
              setText('[data-i18n="listIdLabel"]', locale.listIdLabel);
              setText('[data-i18n="joinListLabel"]', locale.joinListLabel);
              document.querySelectorAll('[data-i18n="joinButton"]').forEach((element) => {
                element.textContent = locale.joinButton || element.textContent || 'Join';
              });
              setText('[data-i18n="landingTitle"]', locale.landingTitle);
              setText('[data-i18n="landingBody"]', locale.landingBody);
              setText('[data-i18n="landingCreateNew"]', locale.landingCreateNew);
              setText('[data-i18n="landingJoinExisting"]', locale.landingJoinExisting);
              setText('[data-i18n="landingInviteJoin"]', locale.landingInviteJoin);
              setText('[data-i18n="landingInviteCancel"]', locale.landingInviteCancel);
              setText('[data-i18n="landingInviteBody"]', locale.landingInviteBody);
              setText('[data-i18n="copyFeedback"]', locale.copyFeedback);
              setText('[data-i18n="addDialogTitle"]', locale.addDialogTitle);
              setText('[data-i18n="addDialogMultiple"]', locale.addDialogMultiple);
              setText('[data-i18n="addDialogSubmit"]', locale.addDialogSubmit);
              setText('[data-i18n="addDialogClose"]', locale.addDialogClose);

              const settingsButton = document.getElementById('open-settings');
              if (settingsButton && locale.settingsTooltip) {
                settingsButton.setAttribute('title', locale.settingsTooltip);
                settingsButton.setAttribute('aria-label', locale.settingsTooltip);
              }

              const toggleModeButton = document.getElementById('toggle-mode');
              if (toggleModeButton && locale.toggleToEdit) {
                toggleModeButton.setAttribute('title', locale.toggleToEdit);
                toggleModeButton.setAttribute('aria-label', locale.toggleToEdit);
                toggleModeButton.classList.toggle('hidden', !showEditButton);
              }

              const titlebarAddButton = document.getElementById('titlebar-add-button');
              if (titlebarAddButton && locale.addButton) {
                titlebarAddButton.setAttribute('title', locale.addButton);
                titlebarAddButton.setAttribute('aria-label', locale.addButton);
              }

              const floatingAddButton = document.getElementById('floating-add-button');
              if (floatingAddButton && locale.addButton) {
                floatingAddButton.setAttribute('title', locale.addButton);
                floatingAddButton.setAttribute('aria-label', locale.addButton);
              }

              const addItemInput = document.getElementById('add-item-input');
              if (addItemInput && locale.addDialogPlaceholder) {
                addItemInput.placeholder = locale.addDialogPlaceholder;
              }

              const closeAddButton = document.getElementById('close-add');
              if (closeAddButton && locale.addDialogClose) {
                closeAddButton.setAttribute('title', locale.addDialogClose);
                closeAddButton.setAttribute('aria-label', locale.addDialogClose);
              }

              const deleteCheckedButton = document.getElementById('delete-checked-button');
              if (deleteCheckedButton && locale.deleteChecked) {
                deleteCheckedButton.setAttribute('title', locale.deleteChecked);
                deleteCheckedButton.setAttribute('aria-label', locale.deleteChecked);
              }

              const presenceIndicator = document.getElementById('presence-indicator');
              if (presenceIndicator && locale.presenceOthersViewing) {
                presenceIndicator.setAttribute('title', locale.presenceOthersViewing);
                presenceIndicator.setAttribute('aria-label', locale.presenceOthersViewing);
              }

              const copyListIdButton = document.getElementById('copy-share-code-button');
              if (copyListIdButton && locale.copyListId) {
                copyListIdButton.setAttribute('title', locale.copyListId);
                copyListIdButton.setAttribute('aria-label', locale.copyListId);
              }

              const shareListButton = document.getElementById('share-list-button');
              if (shareListButton && locale.shareList) {
                shareListButton.setAttribute('title', locale.shareList);
                shareListButton.setAttribute('aria-label', locale.shareList);
              }

              const restore = document.getElementById('restore-code-input');
              if (restore && locale.listIdPlaceholder) {
                restore.placeholder = locale.listIdPlaceholder;
              }

              const loginPassword = document.getElementById('login-password');
              if (loginPassword && locale.loginPasswordLabel) {
                loginPassword.placeholder = locale.loginPasswordLabel;
                loginPassword.setAttribute('aria-label', locale.loginPasswordLabel);
              }

              const landingShareCode = document.getElementById('landing-share-code');
              if (landingShareCode && locale.landingSharePlaceholder) {
                landingShareCode.placeholder = locale.landingSharePlaceholder;
              }
            }, { once: true });
          }

          window.__handlBoot = { activeListId, settings, ui };
        } catch (error) {
          window.__handlBoot = { activeListId: '', settings: {}, ui: null };
        }
      })();
    </script>
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0"
    />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="icon" sizes="192x192" href="/icon-192.png" type="image/png" />
    <link rel="icon" sizes="512x512" href="/icon-512.png" type="image/png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
  </head>
  <body>
    <div id="login-screen" class="login-screen hidden" aria-hidden="true">
      <section class="login-card">
        <div class="landing-copy">
          <h1 data-i18n="loginHeading">Unlock</h1>
        </div>
        <form id="login-form" class="login-form">
          <label class="setting stacked login-field">
            <input
              id="login-password"
              type="password"
              autocomplete="current-password"
              aria-label="Password"
              placeholder="Password"
            />
          </label>
          <p id="login-error" class="login-error hidden" data-i18n="loginInvalid">Incorrect password.</p>
          <button id="login-submit" type="submit" data-i18n="loginSubmit">Enter</button>
        </form>
      </section>
    </div>

    <div id="landing-screen" class="landing-screen hidden" aria-hidden="true">
      <section class="landing-card">
        <div class="landing-copy">
          <h1 data-i18n="landingTitle">Welcome to Handl</h1>
          <p data-i18n="landingBody">Join an existing list or create a new one.</p>
        </div>
        <div id="landing-actions" class="landing-actions">
          <button id="landing-create-button" type="button" data-i18n="landingCreateNew">Create new list</button>
          <button id="landing-join-button" class="ghost" type="button" data-i18n="landingJoinExisting">
            Join existing list
          </button>
        </div>
        <div id="landing-invite-actions" class="landing-actions hidden">
          <button id="landing-invite-join-button" type="button" data-i18n="landingInviteJoin">Join list</button>
          <button id="landing-invite-cancel-button" class="ghost" type="button" data-i18n="landingInviteCancel">
            Cancel
          </button>
        </div>
        <div id="landing-join-form" class="landing-join-form hidden">
          <input
            id="landing-share-code"
            class="share-code-field landing-share-code-field"
            inputmode="text"
            autocomplete="off"
            autocapitalize="characters"
            spellcheck="false"
            placeholder="Share code"
          />
          <button id="landing-join-submit" class="ghost" type="button" data-i18n="joinButton">Join</button>
        </div>
      </section>
    </div>

    <div class="app-shell">
      <section class="pane single-pane">
        <div class="pane-title mode-header">
          <div class="title-block">
            <div class="title-line">
              <h2 id="app-title">Handl</h2>
            </div>
          </div>
          <div class="title-actions">
            <span
              id="status-icon"
              class="status-indicator icon-button"
              role="img"
              aria-label="Connection status"
              aria-live="polite"
            >
              <span id="status-symbol" class="material-symbols-outlined">cloud_off</span>
            </span>
            <span
              id="presence-indicator"
              class="presence-indicator hidden"
              role="status"
              aria-live="polite"
            >
              <span class="material-symbols-outlined">groups</span>
            </span>
            <button id="toggle-mode" class="ghost icon-button" type="button" aria-label="Switch editing mode">
              <span id="mode-icon" class="material-symbols-outlined">edit_note</span>
            </button>
            <button id="titlebar-add-button" class="status-indicator add-indicator hidden" type="button" aria-label="Add item">
              <span class="material-symbols-outlined">add</span>
            </button>
            <button id="delete-checked-button" class="status-indicator delete-indicator" type="button" aria-label="Delete checked items">
              <span class="material-symbols-outlined">delete</span>
            </button>
            <button id="open-settings" class="ghost icon-button" type="button" aria-label="Open settings">
              <span class="material-symbols-outlined">settings</span>
            </button>
          </div>
        </div>
        <div class="pane-divider" aria-hidden="true"></div>
        <div id="checklist" class="checklist single-view" aria-live="polite"></div>
        <textarea
          id="text-editor"
          class="single-edit hidden"
          spellcheck="false"
          placeholder="Milk
Eggs
Bread"
        ></textarea>
      </section>
    </div>

    <dialog id="settings-dialog" class="settings-dialog">
      <form method="dialog">
        <header class="settings-header">
          <h3 data-i18n="settingsTitle">Settings</h3>
          <button id="close-settings" class="icon-button ghost settings-close" type="button" aria-label="Close settings">
            <span class="material-symbols-outlined">close</span>
          </button>
        </header>
        <div class="settings-body">
          <label class="setting">
            <span data-i18n="colorScheme">Color scheme</span>
            <select id="scheme-select"></select>
          </label>
          <label class="setting">
            <span data-i18n="languageLabel">Language</span>
            <select id="language-select"></select>
          </label>
          <label class="setting">
            <span data-i18n="fontSizeLabel">Font size</span>
            <select id="font-size-select">
              <option value="small" data-i18n="fontSizeSmall">Small</option>
              <option value="medium" data-i18n="fontSizeMedium">Medium</option>
              <option value="large" data-i18n="fontSizeLarge">Large</option>
            </select>
          </label>
          <label class="setting">
            <span data-i18n="showAddButton">Show Add button</span>
            <select id="show-add-button">
              <option value="no" data-i18n="addButtonNo">No</option>
              <option value="titlebar" data-i18n="addButtonTitleBar">Title Bar</option>
              <option value="left" data-i18n="addButtonLeft">Left</option>
              <option value="right" data-i18n="addButtonRight">Right</option>
            </select>
          </label>
          <label class="setting keep-bottom">
            <input type="checkbox" id="show-delete-button" />
            <span data-i18n="showDeleteButton">Show delete button</span>
          </label>
          <label class="setting keep-bottom">
            <input type="checkbox" id="show-edit-button" />
            <span data-i18n="showEditButton">Show edit/view button</span>
          </label>
          <label class="setting keep-bottom">
            <input type="checkbox" id="sort-checked" />
            <span data-i18n="sortChecked">Keep checked items at the bottom</span>
          </label>
          <div class="settings-actions">
            <button type="button" id="remove-checked" class="danger" data-i18n="removeChecked">
              Remove checked items
            </button>
          </div>
          <div class="settings-divider" aria-hidden="true"></div>
          <label class="setting stacked">
            <span data-i18n="listIdLabel">List ID</span>
            <div class="share-actions">
              <input id="settings-share-code" class="share-code-field" readonly />
              <div class="copy-share-wrap">
                <button id="copy-share-code-button" class="ghost icon-button share-copy-button" type="button" aria-label="Copy list ID">
                  <span class="material-symbols-outlined">content_copy</span>
                </button>
                <div id="copy-feedback" class="copy-feedback hidden" role="status" aria-live="polite" aria-atomic="true" data-i18n="copyFeedback">Copied</div>
              </div>
              <button id="share-list-button" class="ghost icon-button share-native-button hidden" type="button" aria-label="Share list">
                <span class="material-symbols-outlined">share</span>
              </button>
            </div>
          </label>
          <label class="setting stacked">
            <span data-i18n="joinListLabel">Join list</span>
            <div class="share-actions">
              <input id="restore-code-input" placeholder="List ID" />
              <button id="restore-code-button" class="ghost" type="button" data-i18n="joinButton">Join</button>
            </div>
          </label>
          <a
            class="settings-footer-link"
            href="https://github.com/Lanjelin/Handl"
            target="_blank"
            rel="noreferrer"
            aria-label="View on GitHub"
            title="View on GitHub"
          >
            <svg class="github-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
              <path
                d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.08.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.52-1.07-1.8-.2-3.69-.9-3.69-3.99 0-.88.31-1.61.82-2.18-.08-.2-.36-1.01.08-2.1 0 0 .67-.21 2.2.82a7.63 7.63 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.09.16 1.9.08 2.1.51.57.82 1.29.82 2.18 0 3.1-1.89 3.78-3.69 3.98.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.47.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"
              />
            </svg>
          </a>
        </div>
      </form>
    </dialog>

    <dialog id="confirm-dialog" class="confirm-dialog">
      <form method="dialog">
        <header class="confirm-header">
          <h3 data-i18n="removeCheckedConfirmTitle">Remove checked items?</h3>
        </header>
        <p class="confirm-body" data-i18n="removeCheckedConfirmBody">This cannot be undone.</p>
        <div class="confirm-actions">
          <button id="confirm-cancel" type="button" class="ghost" data-i18n="removeCheckedConfirmCancel">
            Cancel
          </button>
          <button id="confirm-remove" type="button" class="danger" data-i18n="removeCheckedConfirmOk">
            Remove
          </button>
        </div>
      </form>
    </dialog>

    <button
      id="floating-add-button"
      class="status-indicator add-indicator add-floating hidden"
      type="button"
      aria-label="Add item"
    >
      <span class="material-symbols-outlined">add</span>
    </button>

    <dialog id="add-dialog" class="add-dialog">
      <form id="add-form" class="add-form">
        <header class="add-header">
          <h3 data-i18n="addDialogTitle">Add item</h3>
          <button id="close-add" class="icon-button ghost add-close" type="button" aria-label="Close add dialog">
            <span class="material-symbols-outlined">close</span>
          </button>
        </header>
        <input
          id="add-item-input"
          class="add-item-input"
          type="text"
          autofocus
          autocomplete="off"
          spellcheck="false"
          placeholder="Add item"
        />
        <div class="add-actions">
          <label class="setting add-multiple-setting">
            <input type="checkbox" id="add-multiple" />
            <span data-i18n="addDialogMultiple">Multiple</span>
          </label>
          <button id="add-submit" type="submit" data-i18n="addDialogSubmit">Add</button>
        </div>
      </form>
    </dialog>

    <template id="item-template">
      <label class="check-row">
        <input type="checkbox" />
        <span class="item-text"></span>
      </label>
    </template>

  </body>
</html>
